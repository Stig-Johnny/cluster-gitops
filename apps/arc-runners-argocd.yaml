# ArgoCD Application for ARC runner infrastructure
# Applies namespace, sealed secret, and runner scale set apps from runners/
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: arc-runners
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Stig-Johnny/cluster-gitops.git
    targetRevision: HEAD
    path: runners
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
