# Runner scale set for Stig-Johnny repos (Docker-in-Docker jobs)
# Workflows use: runs-on: arc-linux-docker
# Currently only nutri-e/android-ui-tests.yml needs Docker
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: arc-linux-docker-stig-johnny
  namespace: argocd
spec:
  project: default
  source:
    repoURL: ghcr.io/actions/actions-runner-controller-charts
    chart: gha-runner-scale-set
    targetRevision: 0.13.1
    helm:
      valuesObject:
        githubConfigUrl: "https://github.com/Stig-Johnny"
        githubConfigSecret: github-pat
        runnerScaleSetName: "arc-linux-docker"
        minRunners: 0
        maxRunners: 2
        containerMode:
          type: "dind"
        template:
          spec:
            containers:
              - name: runner
                image: ghcr.io/actions/actions-runner:latest
                command: ["/home/runner/run.sh"]
                resources:
                  requests:
                    cpu: "1"
                    memory: "2Gi"
                  limits:
                    cpu: "4"
                    memory: "8Gi"
  destination:
    server: https://kubernetes.default.svc
    namespace: arc-runners
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
